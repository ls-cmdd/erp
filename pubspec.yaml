name: erp_system
description: نظام ERP متكامل - جميع القطاعات والتخصصات
publish_to: none
version: 2.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State
  provider: ^6.1.2

  # Database
  sqflite_common_ffi: ^2.3.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Security
  crypto: ^3.0.3          # SHA-256 password hashing

  # UI / Charts
  fl_chart: ^0.68.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # PDF & Export
  pdf: ^3.11.1
  printing: ^5.13.2
  csv: ^6.0.0

  # Utils
  intl: any # version is dictated by flutter_localizations (sdk) — do not pin
  uuid: ^4.4.2
  shared_preferences: ^2.2.3
  collection: ^1.18.0
  file_picker: ^8.0.7
  url_launcher: ^6.3.0

  # Window management (desktop)
  window_manager: ^0.3.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
